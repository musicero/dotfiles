context.modules = [

    # 1. MASTER HUB: System Audio -> Quad Cortex (AUX6 / AUX7)
    { name = libpipewire-module-loopback
      args = {
        node.description = "Master System Audio"
        capture.props = {
          node.name = "Master_Sink"
          media.class = "Audio/Sink"
          audio.position = [ FL FR ]
        } 
        playback.props = {
          node.name = "Master_To_QC"
          target.object = "alsa_output.usb-Neural_DSP_Quad_Cortex-00.pro-audio"
          audio.position = [ AUX6 AUX7 ] 
          stream.dont-remix = true
          node.passive = true
        }
      }
    },

    # 2. QC Mic (3,4 on the qc) to QC_Wet_Endpoint virtual source
    { name = libpipewire-module-loopback
      args = {
        node.description = "Quad Cortex Wet Guitar"
        capture.props = {
          node.name = "QC_Wet_Capture"
          target.object = "alsa_input.usb-Neural_DSP_Quad_Cortex-00.pro-input-0"
          audio.position = [ AUX2 AUX3 ]
          stream.dont-remix = true
          node.passive = true
        }
        playback.props = {
          node.name = "QC_Wet_Endpoint"
          media.class = "Audio/Source" # Makes it appear as a Microphone to apps
          audio.position = [ FL FR ]
        }
      }
    },

    # 3. ANC BRIDGE: Send PC Audio to ReSpeaker for Cancellation
    { name = libpipewire-module-loopback
      args = {
        node.description = "ANC Bridge: Master -> ReSpeaker"
        capture.props = {
          node.name = "ANC_Master_Capture"
          target.object = "Master_Sink"
          audio.position = [ FL FR ]
          stream.capture.sink = true
        }
        playback.props = {
          node.name = "ANC_Master_Playback"
          target.object = "alsa_output.usb-Seeed_Studio_reSpeaker_XVF3800_4-Mic_Array_114993701254600038-00.analog-stereo"
          audio.position = [ FL FR ]
          
          # FIX 1: Set to false so the AEC chip never "goes to sleep" and resets
          node.passive = false
        }
      }
    },
    
    # Bridge B: Sends QC Wet Guitar to ReSpeaker
    # { name = libpipewire-module-loopback
    #   args = {
    #     node.description = "ANC Bridge: QC Guitar -> ReSpeaker"
    #     capture.props = {
    #       node.name = "ANC_QC_Capture"
    #       target.object = "QC_Wet_Endpoint" # We grab it straight from the Endpoint we made in step 2!
    #       audio.position = [ FL FR ]
    #     }
    #     playback.props = {
    #       node.name = "ANC_QC_Playback"
    #       target.object = "alsa_output.usb-Seeed_Studio_reSpeaker_XVF3800_4-Mic_Array_114993701254600038-00.analog-stereo"
    #       audio.position = [ FL FR ]
    #       node.passive = true
    #     }
    #   }
    # },

    # 4. RESPEAKER CLEAN MIC: The final noise-cancelled voice endpoint
    { name = libpipewire-module-loopback
      args = {
          node.description = "Respeaker Mic (ANC Output)"
          capture.props = {
              node.name = "Respeaker_Raw_Capture"
              target.object = "alsa_input.usb-Seeed_Studio_reSpeaker_XVF3800_4-Mic_Array_114993701254600038-00.analog-stereo"
              audio.position = [ FL ] # Channel 0 is the processed one
              stream.dont-remix = true
          }
          playback.props = {
              node.name = "Respeaker_Mic_Clean"
              media.class = "Audio/Source"
              audio.position = [ MONO ]
          } 
      }
    }
]
